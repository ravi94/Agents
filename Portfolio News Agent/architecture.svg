<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="1480" viewBox="0 0 1180 1480" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowLoop" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9333ea"/>
    </marker>
    <marker id="arrowGuard" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
    </marker>
    <style>
      .title  { font-size: 26px; font-weight: 700; fill: #0f172a; }
      .subtt  { font-size: 14px; fill: #64748b; }
      .box-t  { font-size: 16px; font-weight: 700; }
      .file   { font-size: 12px; font-style: italic; fill: #64748b; }
      .desc   { font-size: 12.5px; fill: #334155; }
      .lbl    { font-size: 12px; font-weight: 600; fill: #475569; }
      .looplbl{ font-size: 12px; font-weight: 700; fill: #7e22ce; }
      .guardlbl{ font-size: 12px; font-weight: 700; fill: #b91c1c; }
      .sec    { font-size: 13px; font-weight: 700; fill: #94a3b8; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="1180" height="1480" fill="#f8fafc"/>

  <!-- Header -->
  <text x="40" y="48" class="title">Portfolio News Agent — Architecture &amp; Code Flow</text>
  <text x="40" y="72" class="subtt">A scheduled tool-calling agent: holdings → LLM-driven research loop (web_search / web_fetch) → synthesized news brief → email / file</text>

  <!-- ============ SCHEDULER ============ -->
  <text x="40" y="112" class="sec">TRIGGER</text>
  <rect x="40" y="124" width="300" height="64" rx="10" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="60" y="150" class="box-t" fill="#0f172a">Scheduler</text>
  <text x="60" y="170" class="file">deploy/com.portfolio.newsagent.plist · cron</text>
  <text x="60" y="183" class="desc">fires daily pre-market (07:00)</text>

  <!-- arrow scheduler -> run.py -->
  <line x1="190" y1="188" x2="190" y2="222" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="212" class="lbl">python -m portfolio_news_agent.run [--dry-run]</text>

  <!-- ============ ENTRY POINT ============ -->
  <rect x="40" y="226" width="1100" height="92" rx="10" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
  <text x="60" y="252" class="box-t" fill="#0369a1">run.py — entry point</text>
  <text x="60" y="270" class="file">portfolio_news_agent/run.py</text>
  <text x="60" y="292" class="desc">1. setup stderr logging   2. load_config()   3. fail-fast: validate_for_email() (unless dry-run/file)</text>
  <text x="60" y="309" class="desc">4. run_agent(cfg) → brief   5. render subject/HTML/text   6. deliver   ·   try/except → exit code 1 on failure</text>

  <!-- arrow run -> config -->
  <line x1="120" y1="318" x2="120" y2="352" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============ CONFIG ============ -->
  <rect x="40" y="356" width="520" height="118" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="60" y="382" class="box-t" fill="#0f172a">config.load_config()</text>
  <text x="60" y="400" class="file">config.py</text>
  <text x="60" y="422" class="desc">• load .env (python-dotenv) → ~25 settings w/ defaults</text>
  <text x="60" y="440" class="desc">• parse holdings.yaml → list[Holding(ticker, name, notes)]</text>
  <text x="60" y="458" class="desc">• validate enums: SEARCH_PROVIDER · TOOL_MODE · DELIVERY_MODE</text>

  <!-- holdings.yaml feeder -->
  <rect x="588" y="356" width="240" height="50" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="608" y="380" class="box-t" fill="#854d0e" font-size="14">holdings.yaml</text>
  <text x="608" y="397" class="desc">ticker / name / notes</text>
  <line x1="588" y1="381" x2="562" y2="381" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- .env feeder -->
  <rect x="588" y="418" width="240" height="50" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="608" y="442" class="box-t" fill="#854d0e" font-size="14">.env</text>
  <text x="608" y="459" class="desc">model · provider · SMTP · guardrails</text>
  <line x1="588" y1="443" x2="562" y2="443" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- arrow config -> loop -->
  <line x1="120" y1="474" x2="120" y2="512" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="130" y="498" class="lbl">Config + Holdings</text>

  <!-- ============ AGENT LOOP (big container) ============ -->
  <rect x="40" y="516" width="1100" height="468" rx="14" fill="#faf5ff" stroke="#9333ea" stroke-width="2.5"/>
  <text x="60" y="544" class="box-t" fill="#7e22ce" font-size="18">agent_loop.run_agent(cfg)  —  THE TOOL-CALLING LOOP</text>
  <text x="60" y="562" class="file">agent_loop.py · the LLM drives iteration; not a fixed pipeline</text>

  <!-- seed messages -->
  <rect x="64" y="578" width="380" height="74" rx="10" fill="#ffffff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="80" y="601" class="box-t" fill="#7e22ce" font-size="14">seed messages</text>
  <text x="80" y="619" class="desc">system: analyst role + grounding rules</text>
  <text x="80" y="636" class="desc">user: "Today is &lt;date&gt;. Holdings: …"  (prompts.py)</text>

  <!-- LLM client box -->
  <rect x="64" y="676" width="380" height="156" rx="10" fill="#ffffff" stroke="#a855f7" stroke-width="2"/>
  <text x="80" y="700" class="box-t" fill="#7e22ce">LLMClient.chat(messages, TOOL_SCHEMAS)</text>
  <text x="80" y="717" class="file">llm_client.py → Ollama /v1/chat/completions</text>
  <text x="80" y="739" class="desc">TOOL_MODE handling (loop never sees the difference):</text>
  <text x="80" y="757" class="desc">• native  — send tools, read message.tool_calls</text>
  <text x="80" y="775" class="desc">• prompt  — inject schemas, parse {"tool_call":…} JSON</text>
  <text x="80" y="793" class="desc">• auto    — try native, else scan content (default)</text>
  <text x="80" y="815" class="desc">→ normalizes everything to ToolCall objects</text>

  <!-- decision: wants_tools? -->
  <polygon points="660,690 760,740 660,790 560,740" fill="#ffffff" stroke="#9333ea" stroke-width="2"/>
  <text x="610" y="738" class="box-t" fill="#7e22ce" font-size="13">wants_tools?</text>
  <text x="585" y="756" class="desc">tool_calls present?</text>

  <!-- arrow chat -> decision -->
  <line x1="444" y1="740" x2="556" y2="740" stroke="#9333ea" stroke-width="2.5" marker-end="url(#arrowLoop)"/>

  <!-- arrow seed -> chat -->
  <line x1="254" y1="652" x2="254" y2="672" stroke="#9333ea" stroke-width="2.5" marker-end="url(#arrowLoop)"/>

  <!-- TOOL DISPATCHER (yes branch) -->
  <rect x="800" y="600" width="316" height="232" rx="10" fill="#ffffff" stroke="#a855f7" stroke-width="2"/>
  <text x="818" y="624" class="box-t" fill="#7e22ce" font-size="14">ToolDispatcher.dispatch()</text>
  <text x="818" y="641" class="file">tools/registry.py · never raises</text>

  <rect x="818" y="652" width="280" height="76" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.3"/>
  <text x="832" y="672" class="box-t" fill="#15803d" font-size="13">web_search(query, max_results)</text>
  <text x="832" y="689" class="desc">pluggable: duckduckgo (default) / serpapi</text>
  <text x="832" y="705" class="desc">per-day cache · throttle+jitter · dedupe</text>
  <text x="832" y="721" class="desc">→ [{title, url, snippet}]</text>

  <rect x="818" y="736" width="280" height="62" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.3"/>
  <text x="832" y="756" class="box-t" fill="#15803d" font-size="13">web_fetch(url)</text>
  <text x="832" y="773" class="desc">GET → trafilatura main text</text>
  <text x="832" y="789" class="desc">truncate to FETCH_CHAR_BUDGET · URL dedupe</text>

  <text x="818" y="819" class="desc">tracks grounding: search_hits / fetch_hits</text>

  <!-- arrow decision -YES-> dispatcher -->
  <line x1="760" y1="720" x2="800" y2="700" stroke="#9333ea" stroke-width="2.5" marker-end="url(#arrowLoop)"/>
  <text x="762" y="694" class="looplbl">YES → run tools</text>

  <!-- feedback arrow dispatcher -> chat (tool results) -->
  <path d="M 958 600 C 958 470, 254 460, 254 672" fill="none" stroke="#9333ea" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrowLoop)"/>
  <text x="470" y="476" class="looplbl">append role:"tool" results → loop again (model decides next step)</text>

  <!-- ====== GUARDRAILS ====== -->
  <rect x="560" y="852" width="556" height="116" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.8"/>
  <text x="578" y="876" class="box-t" fill="#b91c1c" font-size="14">guardrails — any cap trips → _force_final()</text>
  <text x="578" y="896" class="desc">• MAX_ITERATIONS (8)   • MAX_TOOL_CALLS (20)   • RUN_TIMEOUT_SECONDS (300)</text>
  <text x="578" y="914" class="desc">_force_final: append "stop &amp; summarize now" → one LLM call with NO tools</text>
  <text x="578" y="938" class="guardlbl">_finalize() anti-hallucination guard:</text>
  <text x="578" y="956" class="desc">if no grounding (0 hits) → discard brief, return honest "could not retrieve news"</text>

  <!-- arrow dispatcher -> guardrails (counts) -->
  <line x1="900" y1="832" x2="850" y2="850" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowGuard)"/>

  <!-- NO branch out of decision -->
  <line x1="610" y1="790" x2="610" y2="830" stroke="#9333ea" stroke-width="2.5"/>
  <text x="500" y="812" class="looplbl">NO → content is the final brief</text>

  <!-- arrow loop container -> brief -->
  <line x1="120" y1="984" x2="120" y2="1022" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="130" y="1008" class="lbl">final brief (plain prose)</text>

  <!-- ============ BRIEF RENDER ============ -->
  <rect x="40" y="1026" width="520" height="118" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="60" y="1052" class="box-t" fill="#0f172a">brief.py — render</text>
  <text x="60" y="1070" class="file">brief.py</text>
  <text x="60" y="1092" class="desc">• subject() → "Portfolio Brief — &lt;date&gt;"</text>
  <text x="60" y="1110" class="desc">• to_html() → escape, linkify URLs, &lt;p&gt; per block</text>
  <text x="60" y="1128" class="desc">• to_plaintext() → multipart fallback</text>

  <!-- arrow brief -> deliver -->
  <line x1="300" y1="1144" x2="300" y2="1182" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="310" y="1168" class="lbl">subject + HTML + text</text>

  <!-- ============ DELIVERY ============ -->
  <text x="40" y="1176" class="sec"> </text>

  <!-- dry-run -->
  <rect x="40" y="1186" width="330" height="78" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="60" y="1212" class="box-t" fill="#1d4ed8" font-size="14">--dry-run</text>
  <text x="60" y="1232" class="desc">print subject + plaintext to stdout</text>
  <text x="60" y="1250" class="desc">no delivery · for verification</text>

  <!-- email -->
  <rect x="400" y="1186" width="330" height="78" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="420" y="1212" class="box-t" fill="#15803d" font-size="14">deliver/email.py</text>
  <text x="420" y="1232" class="desc">SMTP STARTTLS · multipart HTML+text</text>
  <text x="420" y="1250" class="desc">DELIVERY_MODE=email (default)</text>

  <!-- file -->
  <rect x="760" y="1186" width="330" height="78" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="780" y="1212" class="box-t" fill="#15803d" font-size="14">deliver/file.py</text>
  <text x="780" y="1232" class="desc">write summary-&lt;date&gt;.md → OUTPUT_DIR</text>
  <text x="780" y="1250" class="desc">DELIVERY_MODE=file (no SMTP)</text>

  <!-- arrows brief -> 3 outputs -->
  <line x1="200" y1="1180" x2="200" y2="1186" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="540" y1="1182" x2="560" y2="1186" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="880" y1="1182" x2="900" y2="1186" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============ LEGEND ============ -->
  <text x="40" y="1316" class="sec">LEGEND</text>
  <rect x="40" y="1328" width="22" height="14" rx="3" fill="#faf5ff" stroke="#9333ea" stroke-width="2"/>
  <text x="70" y="1340" class="desc">LLM-driven loop (model decides)</text>
  <rect x="300" y="1328" width="22" height="14" rx="3" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.3"/>
  <text x="330" y="1340" class="desc">tools / providers</text>
  <rect x="470" y="1328" width="22" height="14" rx="3" fill="#fef2f2" stroke="#dc2626" stroke-width="1.8"/>
  <text x="500" y="1340" class="desc">guardrails / safety</text>
  <rect x="640" y="1328" width="22" height="14" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="670" y="1340" class="desc">config inputs</text>
  <line x1="800" y1="1335" x2="850" y2="1335" stroke="#9333ea" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="858" y="1340" class="desc">tool results fed back into the conversation</text>

  <text x="40" y="1380" class="file">All tool-mode complexity lives in llm_client.py · tools never raise into the loop · the anti-hallucination guard makes a flaky local search backend safe for financial news.</text>
</svg>
